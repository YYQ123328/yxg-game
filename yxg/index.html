<div class="room-overlay" id="roomOverlay">
    <div class="room-card">
        <button class="close-room" id="closeRoomBtn">✕</button>
        <div class="room-image-container">
            <!-- 三张图片，默认隐藏，由 JS 控制显示 -->
            <img id="roomImgHome" src="" alt="在家" style="display:none;">

            <img id="roomImgInteract" src="" alt="互动" style="display:none;">
        </div>
        <div class="room-status" id="roomStatus">🔍 正在查看……</div>
        <div class="room-action-area">
            <button class="room-btn" id="roomRefreshBtn">🔄 刷新房间</button>

        </div>
    </div>

<script>
// ===== 房间配置 =====
// ！！！请修改下面的图片路径为你自己的图片！！！
const ROOM_CONFIG = {
    // 在家时的图片
    homeImage: 'oc_home.png',       // ← 替换成你的图片文件名
    // 不在家时的图片
    awayImage: 'room_empty.png',    // ← 替换成你的图片文件名
    // 在家且点击“戳戳ta”后的图片
    interactImage: 'oc_interact.png', // ← 替换成你的图片文件名
    // 角色名称（用于状态文字）
    name: '颜旋光',             // ← 改成你的OC名字
};

// ===== 以下逻辑不用改 =====
let currentState = 'unknown'; // 'home', 'away', 'interact'

const overlay = document.getElementById('roomOverlay');
const closeBtn = document.getElementById('closeRoomBtn');
const refreshBtn = document.getElementById('roomRefreshBtn');
const interactBtn = document.getElementById('roomInteractBtn');
const statusEl = document.getElementById('roomStatus');
const imgHome = document.getElementById('roomImgHome');
const imgAway = document.getElementById('roomImgAway');
const imgInteract = document.getElementById('roomImgInteract');

// 设置图片源
imgHome.src = ROOM_CONFIG.homeImage;
imgAway.src = ROOM_CONFIG.awayImage;
imgInteract.src = ROOM_CONFIG.interactImage;

function hideAllImages() {
    imgHome.style.display = 'none';
    imgAway.style.display = 'none';
    imgInteract.style.display = 'none';
}

function setState(state) {
    hideAllImages();
    currentState = state;
    switch(state) {
        case 'home':
            imgHome.style.display = 'block';
            statusEl.textContent = `${ROOM_CONFIG.name} 在家哦`;
            interactBtn.style.display = 'inline-block';
            break;
        case 'away':
            imgAway.style.display = 'block';
            statusEl.textContent = `${ROOM_CONFIG.name} 出门了……`;
            interactBtn.style.display = 'none';
            break;
        case 'interact':
            imgInteract.style.display = 'block';
            statusEl.textContent = `${ROOM_CONFIG.name} 被你戳了一下！`;
            interactBtn.style.display = 'none'; // 戳完后隐藏按钮，避免重复
            break;
    }
}

function refreshRoom() {
    // 50%概率在家
    const isHome = Math.random() < 0.5;
    setState(isHome ? 'home' : 'away');
}

// 打开房间
function openRoom() {
    overlay.classList.add('active');
    refreshRoom();
}

// 关闭房间
function closeRoom() {
    overlay.classList.remove('active');
}

// 绑定事件
closeBtn.addEventListener('click', closeRoom);
overlay.addEventListener('click', function(e) {
    if (e.target === overlay) closeRoom();
});
refreshBtn.addEventListener('click', refreshRoom);
interactBtn.addEventListener('click', function() {
    if (currentState === 'home') {
        setState('interact');
    }
});

// ===== 暴露 openRoom 函数供首页按钮调用 =====
window.openRoom = openRoom;

// 如果你的首页按钮 ID 是 "enterRoomBtn"，取消注释下面这行：
// document.getElementById('enterRoomBtn').addEventListener('click', openRoom);
</script>

                return { dialogue: '「现在不太饿，如果你饿了的话我去做饭，想吃什么？」' };
            }
        },
        '睡觉': function(activity) {
            if (activity.includes('睡觉') || activity.includes('睡')) {
                return { dialogue: '「我已经在睡了…zzZ…是做噩梦醒了吗？我来抱着你睡吧」' };
            } else if (activity.includes('晚上') || activity.includes('洗澡') || activity.includes('手机')) {
                return { dialogue: '「是该睡了…好吧，你陪我一起躺会儿？」' };
            } else if (activity.includes('电影') || activity.includes('电视')) {
                return { dialogue: '「困了？好的我现在去关下电视，坚持一会。雫雫洗漱了吗？」' };
            } else {
                return { dialogue: '「现在对我来说还早，雫雫，我可以先哄你入睡」' };
            }
        },
        '休息': function(activity) {
            if (activity.includes('睡觉') || activity.includes('睡')) {
                return { dialogue: '「我在休息了宝宝zzZ」' };
            } else if (activity.includes('散步') || activity.includes('走路') || activity.includes('购物')) {
                return { dialogue: '「会累吗？要不要休息一会？」' };
            } else if (activity.includes('电影') || activity.includes('电视')) {
                return { dialogue: '「来一起看吧？想看什么？我去找碟片」' };
            } else {
                return { dialogue: '「嗯…休息一下也好，要不要也喝点什么？抹茶？果茶？还是乳茶？」' };
            }
        },
        '一起看电影': function(activity) {
            if (activity.includes('电影') || activity.includes('电视')) {
                return { dialogue: '「我正在看呢，这一集剧情很不错，要一起吗」' };
            } else if (activity.includes('睡觉') || activity.includes('睡')) {
                return { dialogue: '「现在好困…明天再看好不好🥺」' };
            } else if (activity.includes('吃饭') || activity.includes('午餐') || activity.includes('晚餐')) {
                return { dialogue: '「好啊 不过我可能要一边吃一边陪你了 你要不要也吃点零食？」' };
            } else if (activity.includes('散步') || activity.includes('外面')) {
                return { dialogue: '「在外面呢…回去再陪你看电影吧」' };
            } else {
                return { dialogue: '「好啊！最近正好有一部想看的，你陪我看吧✨」' };
            }
        }
    },

    // 当邀请类型没有对应反应时的默认台词
    fallbackReaction: '「嗯…让我想想…好啊，只要雫雫想做都可以」'
};

// ================================================================
// 🛠️ 以下逻辑无需修改（除非你想定制行为）
// ================================================================

// 获取当前小时
function getCurrentHour() {
    return new Date().getHours();
}

// 格式化时间显示
function formatTime(hour) {
    const now = new Date();
    const h = hour.toString().padStart(2, '0');
    const m = now.getMinutes().toString().padStart(2, '0');
    return `${h}:${m}`;
}

// 根据小时获取活动
function getActivityForHour(hour) {
    return SCHEDULE_CONFIG.schedule[hour] || '在做一些神秘的事情…🔮';
}

// 更新日程面板
function updateSchedulePanel() {
    const hour = getCurrentHour();
    document.getElementById('scheduleTimeDisplay').textContent = `⏰ ${formatTime(hour)}`;
    const activity = getActivityForHour(hour);
    document.getElementById('scheduleActivityDisplay').textContent = activity;

    // 生成邀请按钮
    const container = document.getElementById('inviteButtonsContainer');
    container.innerHTML = '';
    const inviteTypes = ['吃饭', '睡觉', '休息', '一起看电影'];
    inviteTypes.forEach(type => {
        const btn = document.createElement('button');
        btn.className = 'invite-btn';
        btn.textContent = type;
        btn.addEventListener('click', function() {
            handleInvite(type, activity);
        });
        container.appendChild(btn);
    });
}

// 处理邀请
function handleInvite(inviteType, currentActivity) {
    const reactionFunc = SCHEDULE_CONFIG.reactions[inviteType];
    let result;
    if (reactionFunc) {
        result = reactionFunc(currentActivity);
    } else {
        result = { dialogue: SCHEDULE_CONFIG.fallbackReaction };
    }
    // 显示反应弹窗
    showReaction(result.dialogue);
}

// 显示反应弹窗
function showReaction(dialogue) {
    const avatar = document.getElementById('reactionAvatar');
    // 设置大头立绘
    if (SCHEDULE_CONFIG.headshotImage && SCHEDULE_CONFIG.headshotImage.trim() !== '') {
        avatar.src = SCHEDULE_CONFIG.headshotImage;
        avatar.style.display = 'block';
    } else {
        avatar.style.display = 'none';
    }
    document.getElementById('reactionDialogue').textContent = dialogue;
    document.getElementById('reactionOverlay').classList.add('active');
}

// 关闭反应弹窗
document.getElementById('reactionCloseBtn').addEventListener('click', function() {
    document.getElementById('reactionOverlay').classList.remove('active');
});
document.getElementById('reactionOverlay').addEventListener('click', function(e) {
    if (e.target === this) {
        this.classList.remove('active');
    }
});

// 日程弹窗控制
function openSchedule() {
    updateSchedulePanel();
    document.getElementById('scheduleOverlay').classList.add('active');
}
function closeSchedule() {
    document.getElementById('scheduleOverlay').classList.remove('active');
}
document.getElementById('scheduleCloseBtn').addEventListener('click', closeSchedule);
document.getElementById('scheduleOverlay').addEventListener('click', function(e) {
    if (e.target === this) closeSchedule();
});

// 暴露函数供按钮调用
window.openSchedule = openSchedule;

// 如果你的首页已有“日程”按钮，取消注释下面这行（并将按钮ID改为你的实际ID）：
document.getElementById('scheduleBtn').addEventListener('click', openSchedule);

<div class="wardrobe-overlay" id="wardrobeOverlay">
    <div class="wardrobe-scene">
        <!-- 左侧预览区 -->
        <div class="preview-area">
            <img id="layer-body" src="" alt="素体">
            <img id="layer-top" src="" alt="上衣" style="display:none;">
            <img id="layer-bottom" src="" alt="下装" style="display:none;">
            <img id="layer-hat" src="" alt="帽子" style="display:none;">
            <img id="layer-shoes" src="" alt="鞋子" style="display:none;">
        </div>

        <!-- 右侧选择面板 -->
        <div class="selection-panel" id="selectionPanel">
            <h3>🧥 衣柜</h3>
            <!-- 各分类将由 JS 动态生成 -->
        </div>

        <!-- 底部导航 -->
        <div class="bottom-nav">
            <button class="nav-btn" id="randomOutfitBtn">🎲 随机搭配</button>
            <button class="nav-btn back" id="wardrobeBackBtn">🏠 返回首页</button>
        </div>
    </div>
</div>

<script>
// ================================================================
// 🎮 配置区 —— 在这里填写你的图片文件名
// ================================================================

const CLOTHING_CONFIG = {
    // 素体（必填）
    body: 'body.png',

    // 上衣（包括裙子，coversBottom: true 表示连体衣，会隐藏下装）
    tops: [
        { id: 'top1', name: '上衣1', file: 'top1.png', coversBottom: false },
        { id: 'top2', name: '上衣2', file: 'top2.png', coversBottom: false },
        { id: 'dress1', name: '裙子1', file: 'dress1.png', coversBottom: true },
        { id: 'dress2', name: '裙子2', file: 'dress2.png', coversBottom: true },
    ],

    // 下装（裤子）
    bottoms: [
        { id: 'pants1', name: '裤子1', file: 'pants1.png' },
        { id: 'pants2', name: '裤子2', file: 'pants2.png' },
    ],

    // 帽子
    hats: [
        { id: 'hat1', name: '帽子1', file: 'hat1.png' },
        { id: 'hat2', name: '帽子2', file: 'hat2.png' },
    ],

    // 鞋子
    shoes: [
        { id: 'shoe1', name: '鞋子', file: 'shoe1.png' },
    ],
};

// ================================================================
// 🛠️ 以下逻辑不用改（除非你想定制行为）
// ================================================================

// 当前选中的部件ID
let current = {
    top: null,
    bottom: null,
    hat: null,
    shoe: null,
};

// DOM 元素
const layers = {
    body: document.getElementById('layer-body'),
    top: document.getElementById('layer-top'),
    bottom: document.getElementById('layer-bottom'),
    hat: document.getElementById('layer-hat'),
    shoes: document.getElementById('layer-shoes'),
};

// 设置素体
layers.body.src = CLOTHING_CONFIG.body;

// 生成选择面板
function buildPanel() {
    const panel = document.getElementById('selectionPanel');
    panel.innerHTML = '<h3>🧥 衣柜</h3>';

    // 上衣分类
    addCategory(panel, '上衣 / 裙子', CLOTHING_CONFIG.tops, 'top', (item) => {
        return item.coversBottom ? '👗 ' + item.name : '👕 ' + item.name;
    });

    // 下装分类
    addCategory(panel, '下装', CLOTHING_CONFIG.bottoms, 'bottom');

    // 帽子分类
    addCategory(panel, '帽子', CLOTHING_CONFIG.hats, 'hat');

    // 鞋子分类
    addCategory(panel, '鞋子', CLOTHING_CONFIG.shoes, 'shoe');
}

function addCategory(container, label, items, type, labelFormatter) {
    if (!items || items.length === 0) return;
    const group = document.createElement('div');
    group.className = 'category-group';
    const title = document.createElement('div');
    title.className = 'category-label';
    title.textContent = label;
    group.appendChild(title);

    const btnWrap = document.createElement('div');
    btnWrap.className = 'item-buttons';

    items.forEach(item => {
        const btn = document.createElement('button');
        btn.className = 'item-btn';
        btn.textContent = labelFormatter ? labelFormatter(item) : item.name;
        btn.dataset.type = type;
        btn.dataset.id = item.id;
        btn.addEventListener('click', function() {
            selectItem(type, item.id);
        });
        btnWrap.appendChild(btn);
    });

    group.appendChild(btnWrap);
    container.appendChild(group);
}

// 选择部件
function selectItem(type, id) {
    // 清除该分类所有按钮的高亮
    document.querySelectorAll(`.item-btn[data-type="${type}"]`).forEach(b => b.classList.remove('active'));

    // 高亮当前按钮
    const targetBtn = document.querySelector(`.item-btn[data-type="${type}"][data-id="${id}"]`);
    if (targetBtn) targetBtn.classList.add('active');

    // 更新 current
    current[type] = id;

    // 更新图层
    updateLayers();
}

// 更新所有图层显示
function updateLayers() {
    // 上衣
    const topItem = CLOTHING_CONFIG.tops.find(t => t.id === current.top);
    if (topItem) {
        layers.top.src = topItem.file;
        layers.top.style.display = 'block';
        // 如果是裙子（coversBottom），隐藏下装层
        if (topItem.coversBottom) {
            layers.bottom.style.display = 'none';
        } else {
            // 如果当前有下装，显示
            const bottomItem = CLOTHING_CONFIG.bottoms.find(b => b.id === current.bottom);
            layers.bottom.style.display = bottomItem ? 'block' : 'none';
        }
    } else {
        layers.top.style.display = 'none';
        // 没有上衣时，下装可以显示
        const bottomItem = CLOTHING_CONFIG.bottoms.find(b => b.id === current.bottom);
        layers.bottom.style.display = bottomItem ? 'block' : 'none';
    }

    // 下装（如果上衣是裙子，下装已经被隐藏，但这里仍设置src以备后续切换上衣时恢复）
    const bottomItem = CLOTHING_CONFIG.bottoms.find(b => b.id === current.bottom);
    if (bottomItem) {
        layers.bottom.src = bottomItem.file;
        // 注意：显示与否由上衣控制，这里只设src
        if (!topItem || !topItem.coversBottom) {
            layers.bottom.style.display = 'block';
        }
    } else {
        layers.bottom.style.display = 'none';
    }

    // 帽子
    const hatItem = CLOTHING_CONFIG.hats.find(h => h.id === current.hat);
    if (hatItem) {
        layers.hat.src = hatItem.file;
        layers.hat.style.display = 'block';
    } else {
        layers.hat.style.display = 'none';
    }

    // 鞋子
    const shoeItem = CLOTHING_CONFIG.shoes.find(s => s.id === current.shoe);
    if (shoeItem) {
        layers.shoes.src = shoeItem.file;
        layers.shoes.style.display = 'block';
    } else {
        layers.shoes.style.display = 'none';
    }
}

// 随机搭配
function randomOutfit() {
    // 随机选上衣
    const randTop = CLOTHING_CONFIG.tops[Math.floor(Math.random() * CLOTHING_CONFIG.tops.length)];
    selectItem('top', randTop.id);

    // 如果上衣不是裙子，随机选下装
    if (!randTop.coversBottom && CLOTHING_CONFIG.bottoms.length > 0) {
        const randBottom = CLOTHING_CONFIG.bottoms[Math.floor(Math.random() * CLOTHING_CONFIG.bottoms.length)];
        selectItem('bottom', randBottom.id);
    } else {
        // 如果是裙子，清除下装选择
        current.bottom = null;
        document.querySelectorAll('.item-btn[data-type="bottom"]').forEach(b => b.classList.remove('active'));
        layers.bottom.style.display = 'none';
    }

    // 随机选帽子
    if (CLOTHING_CONFIG.hats.length > 0) {
        const randHat = CLOTHING_CONFIG.hats[Math.floor(Math.random() * CLOTHING_CONFIG.hats.length)];
        selectItem('hat', randHat.id);
    }

    // 随机选鞋子
    if (CLOTHING_CONFIG.shoes.length > 0) {
        const randShoe = CLOTHING_CONFIG.shoes[Math.floor(Math.random() * CLOTHING_CONFIG.shoes.length)];
        selectItem('shoe', randShoe.id);
    }
}

// 打开/关闭衣柜
function openWardrobe() {
    document.getElementById('wardrobeOverlay').classList.add('active');
    // 如果没有默认搭配，随机一套
    if (!current.top) randomOutfit();
}
function closeWardrobe() {
    document.getElementById('wardrobeOverlay').classList.remove('active');
}

// 绑定事件
document.getElementById('wardrobeBackBtn').addEventListener('click', closeWardrobe);
document.getElementById('randomOutfitBtn').addEventListener('click', randomOutfit);

// 暴露函数
window.openWardrobe = openWardrobe;

// 初始化面板
buildPanel();

// 如果你的首页已有“🧥 衣柜”按钮，取消注释下面这行：
document.getElementById('wardrobeBtn').addEventListener('click', openWardrobe);
</script>
